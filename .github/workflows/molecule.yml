---
name: Molecule

on:
  push:
    paths:
      - "ansible/roles/**"
      - ".github/workflows/molecule.yml"
  pull_request:
    paths:
      - "ansible/roles/**"
      - ".github/workflows/molecule.yml"

jobs:
  molecule:
    name: "${{ matrix.role }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role:
          - prerequisites
          - amneziawg
          - xray
          - hysteria2
          - firewall

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/workflows/requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.docker ansible.posix

      - name: Run Molecule
        # --all: firewall has a second scenario (empty-whitelist) covering
        # the lockout-guard edge case; --all is a no-op for every other role
        # here since they only define the default scenario.
        run: molecule test --all
        working-directory: ansible/roles/${{ matrix.role }}
        env:
          ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "true"

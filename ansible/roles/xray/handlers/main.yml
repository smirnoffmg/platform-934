---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  # Docker containers in this scenario do not boot with systemd as PID 1
  # (confirmed via molecule test: "System has not been booted with systemd").
  when: ansible_virtualization_type != 'docker'

- name: Restart xray
  ansible.builtin.systemd:
    name: xray
    state: restarted
  # Docker containers may not have a fully functional systemd — restart is
  # verified on a real VPS (AC-4).
  when: ansible_virtualization_type != 'docker'

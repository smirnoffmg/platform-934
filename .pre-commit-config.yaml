repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown]
        args: [--write]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/ansible/ansible-lint
    rev: v25.9.0
    hooks:
      - id: ansible-lint
        files: ^ansible/
        args: ["ansible/playbook.yml"]

  - repo: local
    hooks:
      - id: pet-validate
        name: pet validate
        entry: pet validate
        language: system
        pass_filenames: false
        files: ^doc/product/
